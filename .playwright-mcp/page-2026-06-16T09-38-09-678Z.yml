        - paragraph [ref=e78]:
          - text: BVM, short for Bun Version Manager, is an independent open-source Bun version manager for Windows, macOS, and Linux. The CLI is distributed on npm as the
          - code [ref=e79]: bvm-core
          - text: package and runs as the
          - code [ref=e80]: bvm
          - text: command.
        - heading "What BVM is Permalink to \"What BVM is\"" [level=2] [ref=e81]:
          - text: What BVM is
          - link "Permalink to \"What BVM is\"" [ref=e82] [cursor=pointer]:
            - /url: "#what-bvm-is"
            - text: "#"
        - list [ref=e83]:
          - listitem [ref=e84]: BVM installs and switches Bun versions with one CLI workflow.
          - listitem [ref=e85]: BVM isolates global tools per Bun version to avoid cross-version conflicts.
          - listitem [ref=e86]: BVM bootstraps itself with its own runtime path, so it can keep working even when the system Bun is missing or broken.
        - heading "Who BVM is for Permalink to \"Who BVM is for\"" [level=2] [ref=e87]:
          - text: Who BVM is for
          - link "Permalink to \"Who BVM is for\"" [ref=e88] [cursor=pointer]:
            - /url: "#who-bvm-is-for"
            - text: "#"
        - list [ref=e89]:
          - listitem [ref=e90]: Developers using Bun across multiple projects
          - listitem [ref=e91]: Teams that need predictable Bun version pinning
          - listitem [ref=e92]: Windows developers who want a Bun manager with a first-class Windows path
          - listitem [ref=e93]: AI coding workflows that need repeatable Bun setup and version switching
