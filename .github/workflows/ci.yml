name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - run: bun install --frozen-lockfile
      - name: Install Remotion dependencies
        working-directory: website/remotion-bvm
        run: npm ci
      - run: bun run typecheck
      - name: Typecheck Remotion
        working-directory: website/remotion-bvm
        run: npm exec tsc -- --noEmit -p tsconfig.json
      - run: bun run build

      - name: Unit tests
        if: runner.os != 'Windows'
        run: bun run test:unit

      - name: Native Windows unit tests
        if: runner.os == 'Windows'
        run: >-
          bun test
          test/windows_shim_fixer.test.ts
          test/bun_cmd_intercept.test.ts
          test/install_integrity_contract.test.ts
          test/release_contract.test.ts
          website/test/install-function.test.ts
          website/test/site-metadata.test.ts
          website/test/sync-docs.test.ts

      - run: bun run test:isolated
      - run: bun run test:e2e

      - name: Coverage
        if: runner.os == 'Linux'
        run: bun run test:coverage

      - name: Validate package contents
        if: runner.os == 'Linux'
        run: bun pm pack --dry-run
